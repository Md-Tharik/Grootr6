<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Job Runner</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;height:100%;
  background:#000;
  overflow:hidden;
  touch-action:none;
  user-select:none;-webkit-user-select:none;
}

/* Canvas sits fixed covering the ENTIRE screen */
#c{
  position:fixed;
  top:0;left:0;
  /* CSS size controlled by JS — no body flex needed */
  background:#000;
  touch-action:none;
  cursor:none;
}

/* ── ROTATE OVERLAY (portrait) ── */
#rot{
  display:none;
  position:fixed;inset:0;
  background:#000;
  z-index:200;
  flex-direction:column;
  align-items:center;justify-content:center;
  gap:18px;
  color:#fff;
  text-align:center;
  padding:24px;
}
#rot svg{animation:rota 2s ease-in-out infinite;}
@keyframes rota{0%,100%{transform:rotate(0)}50%{transform:rotate(-90deg)}}
#rot h3{font:700 1.2rem/1 system-ui;letter-spacing:.5px;}
#rot p{font:400 .85rem/1.4 monospace;color:#475569;}
@media(orientation:portrait){#rot{display:flex;}}

/* ── DEATH OVERLAY ── */
#ov{
  display:none;
  position:fixed;inset:0;
  background:rgba(2,6,23,.93);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  z-index:100;
  flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;
  cursor:pointer;
}
#ov.on{display:flex;}

#gv{
  width:min(420px,80vw);
  max-height:32vh;
  border-radius:14px;
  border:2px solid #ef4444;
  object-fit:cover;
  pointer-events:none;
  box-shadow:0 0 40px rgba(239,68,68,.3);
}
#dc{
  text-align:center;
  padding:20px 32px;
  border-radius:16px;
  background:rgba(10,10,25,.9);
  border:1px solid rgba(255,255,255,.1);
  max-width:min(460px,86vw);
  pointer-events:none;
}
#dc h2{
  font:800 clamp(1rem,3vw,1.5rem)/1 system-ui;
  color:#ef4444;margin-bottom:8px;
  text-transform:uppercase;letter-spacing:1px;
}
#dc .sc{font:700 clamp(.85rem,2vw,1.05rem)/1 monospace;color:#fbbf24;margin-bottom:8px;}
#dc .ms{font:400 clamp(.72rem,1.5vw,.88rem)/1.5 monospace;color:#94a3b8;margin-bottom:14px;}
#dc .rp{
  display:inline-block;
  font:600 clamp(.72rem,1.5vw,.88rem)/1 system-ui;
  color:#e2e8f0;padding:8px 22px;border-radius:30px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:.45}50%{opacity:1}}
@media(max-height:460px){#gv{display:none;}}

/* ── FULLSCREEN BUTTON ── */
#fsBtn{
  position:fixed;
  /* safe-area-inset handles notches; fallback to 10px */
  top:max(10px, env(safe-area-inset-top, 10px));
  right:max(10px, env(safe-area-inset-right, 10px));
  z-index:150;
  /* fluid size: 28px on tiny screens → 36px on large screens */
  width:clamp(28px,4vmin,36px);
  height:clamp(28px,4vmin,36px);
  border-radius:clamp(6px,1vmin,10px);
  border:1px solid rgba(255,255,255,.18);
  background:rgba(2,6,23,.82);
  color:#e2e8f0;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,border-color .2s,transform .15s;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  box-shadow:0 2px 10px rgba(0,0,0,.5);
  touch-action:manipulation;
  /* prevent button from eating canvas pointer events */
  pointer-events:auto;
}
#fsBtn:hover{background:rgba(56,189,248,.18);border-color:rgba(56,189,248,.4);}
#fsBtn:active{transform:scale(.90);}
/* icon scales with button */
#fsBtn svg{
  width:clamp(12px,1.8vmin,16px);
  height:clamp(12px,1.8vmin,16px);
  stroke:#38bdf8;fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;
}
/* hide behind rotate overlay in portrait */
@media(orientation:portrait){#fsBtn{display:none;}}

/* ── MEDIA QUERIES ── */
/* Death overlay: smaller padding on compact screens */
@media(max-width:480px){
  #dc{padding:12px 16px;}
  #dc h2{font-size:.9rem;}
  #dc .rp{padding:6px 16px;}
}
/* Very short landscape (e.g. iPhone SE landscape) */
@media(max-height:380px){
  #fsBtn{
    top:6px;
    right:6px;
    width:26px;height:26px;border-radius:6px;
  }
  #fsBtn svg{width:11px;height:11px;}
  #dc{padding:8px 14px;gap:8px;}
  #gv{display:none;}
}
</style>
</head>
<body>

<!-- Portrait rotate screen covers everything -->
<div id="rot">
  <svg width="52" height="52" viewBox="0 0 24 24" fill="none"
       stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round">
    <rect x="5" y="2" width="14" height="20" rx="2"/>
    <path d="M9 21h6"/>
  </svg>
  <h3>Rotate your device</h3>
  <p>This game runs in landscape mode</p>
</div>

<canvas id="c"></canvas>

<!-- Fullscreen toggle button -->
<button id="fsBtn" title="Toggle fullscreen" aria-label="Toggle fullscreen">
  <!-- enter-fullscreen icon (shown by default) -->
  <svg id="fsEnter" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
  <!-- exit-fullscreen icon (shown when fullscreen) -->
  <svg id="fsExit" viewBox="0 0 24 24" style="display:none"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 0 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>
</button>

<div id="ov">
  <video id="gv" playsinline loop muted></video>
  <div id="dc">
    <h2 id="dt">RESUME CAUGHT YOU</h2>
    <p class="sc" id="ds">0 m &nbsp;·&nbsp; 🫓 0</p>
    <p class="ms" id="dm"></p>
    <span class="rp">TAP ANYWHERE TO RETRY</span>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   FILES — put in same folder as this HTML
   ═══════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════
   FILES — put in same folder as this HTML
   ═══════════════════════════════════════════════ */
const F = {
  player:'player.png', vada:'vada.png', resume:'resume.png',
  jump:'jump.mp3', bgm:'bgm.mp3', gameover:'gameover.mp4',
};

const IM = {};
['player','vada','resume'].forEach(k=>{ IM[k]=new Image(); IM[k].src=F[k]; });
function ok(k){ return IM[k].complete && IM[k].naturalWidth>0; }

const BGM = new Audio(F.bgm); BGM.loop=true; BGM.volume=.3;
function jsfx(){ try{const a=new Audio(F.jump);a.volume=.5;a.play();}catch(_){} }


/* ═══════════════════════════════════════════════
   CANVAS — fixed, fills entire screen
   ═══════════════════════════════════════════════ */
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let IW=1024; 
const IH=576;                   /* internal height stays fixed */
let   GS=1;                     
let   OX=0, OY=0;               


function resize(){
  const isFS = !!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement);
  
  // Get actual viewport dimensions
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Calculate dynamic internal width based on aspect ratio
  // This prevents UI clipping on extra-wide mobile screens!
  IW = Math.ceil(vw * (IH / vh));

  // Lock the canvas size exactly to the window
  cv.style.width  = vw + 'px';
  cv.style.height = vh + 'px';
  cv.style.left   = '0px';
  cv.style.top    = '0px';

  // Apply the newly calculated resolution internally
  cv.width  = IW;
  cv.height = IH;
}


resize();
window.addEventListener('resize', resize);
document.addEventListener('fullscreenchange',     ()=>{ setTimeout(resize,80); });
document.addEventListener('webkitfullscreenchange',()=>{ setTimeout(resize,80); });
document.addEventListener('mozfullscreenchange',  ()=>{ setTimeout(resize,80); });
try{ screen.orientation?.addEventListener('change',()=>setTimeout(resize,80)); }catch(_){}

/* ═══════════════════════════════════════════════
   FULLSCREEN — called every single game start
   No guard — browser will grant or deny each time
   ═══════════════════════════════════════════════ */
function goFS(){
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen
           || el.mozRequestFullScreen || el.msRequestFullscreen;
  if(fn){
    fn.call(el)
      .then(()=>{
        try{ screen.orientation?.lock('landscape-primary').catch(()=>{}); }catch(_){}
        setTimeout(resize,120);
      })
      .catch(()=>{ setTimeout(resize,100); });
  }
  /* iOS Safari: scroll to hide toolbar */
  setTimeout(()=>{ try{ window.scrollTo(0,1); }catch(_){} }, 300);
}

/* ═══════════════════════════════════════════════
   GAME CONSTANTS
   ═══════════════════════════════════════════════ */
const GY      = 400;    /* ground Y in canvas coords */
const PX      = 190;    /* player fixed X            */
const GRAVITY = 0.58;
const JV      = -14;    /* jump vy                   */
const DJV     = -11.5;  /* double-jump vy            */
const SPD0    = 5.2;    /* start speed               */
const RGAP0   = 215;    /* resume start gap (visible)*/

/* ═══════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════ */
let MODE='menu', tick=0, wx0=0, score=0, vadas=0, spd=SPD0, rGap=RGAP0;
const PL={ y:GY,vy:0,w:115,h:160,j:0,mj:2,gr:true,inv:0 }; // Dynamically larger size
let grounds=[],plats=[],obs=[],coins=[],parts=[],msgs=[],bldgs=[];
let genX=IW+200;

/* ═══════════════════════════════════════════════
   OBSTACLE CATALOGUE
   ═══════════════════════════════════════════════ */
const OBSCAT=[
  { id:'stamp',w:66,h:88,
    txt:'HR stamped REJECTED on your path. Skill issue.',
    draw(x,y,w,h){
      cx.fillStyle='#64748b'; rbox(x+w*.32,y-10,w*.36,h*.35,5);
      const g=cx.createLinearGradient(x,y+h*.33,x,y+h);
      g.addColorStop(0,'#ef4444'); g.addColorStop(1,'#991b1b');
      cx.fillStyle=g; rbox(x,y+h*.33,w,h*.67,6);
      cx.fillStyle='rgba(255,255,255,.14)'; cx.fillRect(x+4,y+h*.37,w-8,9);
      cx.fillStyle='#fff';
      cx.font=`bold ${Math.floor(h*.18)}px monospace`;
      cx.textAlign='center'; cx.textBaseline='middle';
      cx.fillText('REJECTED',x+w/2,y+h*.63);
      cx.font=`bold ${Math.floor(h*.26)}px serif`;
      cx.fillText('\u2717',x+w/2,y+h*.85);
    }
  },
  { id:'wall',w:58,h:108,
    txt:'5 years experience for intern. Classic corporate wall.',
    draw(x,y,w,h){
      const BC=['#ef4444','#3b82f6','#f59e0b','#22c55e','#a855f7','#06b6d4'];
      const bh=22,bw=40;
      cx.save(); cx.beginPath(); cx.rect(x,y,w,h); cx.clip();
      for(let r=0;r<Math.ceil(h/bh);r++){
        const off=r%2===0?0:20;
        for(let c=-1;c<=Math.ceil(w/bw)+1;c++){
          cx.fillStyle=BC[(r*3+c*2+5)%BC.length];
          cx.fillRect(x+c*bw+off+1,y+r*bh+1,bw-2,bh-2);
        }
      }
      cx.restore();
      cx.fillStyle='#fffbeb'; rbox(x+2,y+3,w-4,26,3);
      cx.strokeStyle='#f59e0b'; cx.lineWidth=1.5; cx.stroke();
      cx.fillStyle='#b91c1c'; cx.font='bold 7px monospace'; cx.textAlign='center';
      cx.fillText('5 YRS EXP REQUIRED',x+w/2,y+12);
      cx.fillText('(for intern)',x+w/2,y+22);
    }
  },
  { id:'cones',w:92,h:80,
    txt:'Three traffic cones blocking your career path. Poetic.',
    draw(x,y,w,h){
      const xs=[x+2,x+w/2-12,x+w-26];
      xs.forEach(cx0=>{
        cx.fillStyle='#1e293b'; cx.fillRect(cx0-2,y+h*.88,28,h*.12);
        cx.beginPath();
        cx.moveTo(cx0+13,y);
        cx.lineTo(cx0,y+h*.88);
        cx.lineTo(cx0+26,y+h*.88);
        cx.closePath();
        const cg=cx.createLinearGradient(cx0,y,cx0,y+h*.88);
        cg.addColorStop(0,'#fb923c'); cg.addColorStop(.45,'#f97316');
        cg.addColorStop(.5,'#fff');   cg.addColorStop(.56,'#f97316');
        cg.addColorStop(1,'#ea580c');
        cx.fillStyle=cg; cx.fill();
        cx.strokeStyle='rgba(0,0,0,.2)'; cx.lineWidth=1; cx.stroke();
      });
    }
  },
  { id:'chair',w:74,h:96,
    txt:'Mandatory unpaid overtime chair blocked the road.',
    draw(x,y,w,h){
      cx.fillStyle='#334155';
      [-22,-8,8,22].forEach(dx=>{
        cx.beginPath(); cx.arc(x+w/2+dx,y+h,7,0,Math.PI*2); cx.fill();
        cx.fillStyle='#475569'; cx.beginPath(); cx.arc(x+w/2+dx,y+h,3,0,Math.PI*2); cx.fill();
        cx.fillStyle='#334155';
      });
      cx.fillStyle='#475569';
      cx.fillRect(x+w/2-26,y+h-8,52,7); cx.fillRect(x+w/2-5,y+h*.55,10,h*.45);
      const sg=cx.createLinearGradient(x+8,y+h*.5,x+8,y+h*.62);
      sg.addColorStop(0,'#ef4444'); sg.addColorStop(1,'#b91c1c');
      cx.fillStyle=sg; rbox(x+8,y+h*.5,w-16,h*.12,5);
      cx.fillStyle='#1e293b'; rbox(x+5,y+h*.3,10,h*.22,3); rbox(x+w-15,y+h*.3,10,h*.22,3);
      const bg=cx.createLinearGradient(x+14,y,x+14,y+h*.52);
      bg.addColorStop(0,'#ef4444'); bg.addColorStop(1,'#991b1b');
      cx.fillStyle=bg; rbox(x+14,y,w-28,h*.52,6);
      cx.fillStyle='rgba(255,255,255,.15)'; cx.fillRect(x+w/2-4,y+6,8,h*.38);
      cx.fillStyle='#fff'; cx.font='bold 7px monospace'; cx.textAlign='center';
      cx.fillText('OVERTIME',x+w/2,y+h*.22);
    }
  },
  { id:'email',w:88,h:64,
    txt:"We'll be in touch. (They won't.)",
    draw(x,y,w,h){
      const ey=y+h*.18;
      cx.fillStyle='#fef9c3'; cx.strokeStyle='#fbbf24'; cx.lineWidth=2;
      rbox(x,ey,w,h*.82,5); cx.stroke();
      cx.fillStyle='#fef08a';
      cx.beginPath();
      cx.moveTo(x,ey); cx.lineTo(x+w/2,ey+h*.32); cx.lineTo(x+w,ey);
      cx.closePath(); cx.fill(); cx.stroke();
      cx.fillStyle='#92400e'; cx.font='bold 8px monospace'; cx.textAlign='center';
      cx.fillText('Dear Candidate,',x+w/2,ey+h*.5);
      cx.fillStyle='#b45309'; cx.font='7.5px monospace';
      cx.fillText(tick%80<40?"We'll be in touch! :)":"(we won't btw)",x+w/2,ey+h*.67);
      cx.fillText('"salary: exposure"',x+w/2,ey+h*.83);
    }
  },
];

/* ═══════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════ */
function rbox(x,y,w,h,r){ cx.beginPath(); cx.roundRect(x,y,w,h,r); cx.fill(); }
function sw(v){ return v-wx0; }

/* ═══════════════════════════════════════════════
   WORLD GENERATION
   ═══════════════════════════════════════════════ */
function gen(){
  const r=Math.random();
  if(r<0.52){
    const w=290+Math.random()*230;
    grounds.push({x:genX,w});
    if(Math.random()<.68){
      const ob=OBSCAT[Math.floor(Math.random()*OBSCAT.length)];
      obs.push({...ob,x:genX+80+Math.random()*(w-180),y:GY});
    }
    const n=3+Math.floor(Math.random()*4);
    for(let i=0;i<n;i++) coins.push({x:genX+40+i*(w-80)/n,y:GY-34-Math.random()*60,got:false});
    genX+=w;
  } else if(r<.80){
    const gap=95+Math.random()*75, pw=110+Math.random()*60, py=GY-90-Math.random()*50;
    obs.push({isPit:true,x:genX,pitW:gap,w:gap,h:0,y:GY,txt:'Fell in the career gap.'});
    plats.push({x:genX+gap/2-pw/2,y:py,w:pw});
    coins.push({x:genX+gap/2,   y:py-38,got:false});
    coins.push({x:genX+gap/2+30,y:py-50,got:false});
    genX+=gap+20;
    const lw=200+Math.random()*160;
    grounds.push({x:genX,w:lw});
    genX+=lw;
  } else {
    if(score>280){
      obs.push({isPit:true,x:genX,pitW:95,w:95,h:0,y:GY,txt:'Missed the stepping stone.'});
      plats.push({x:genX+8,y:GY-80,w:85});
      coins.push({x:genX+50,y:GY-108,got:false});
      genX+=105;
      obs.push({isPit:true,x:genX,pitW:90,w:90,h:0,y:GY,txt:'Double gap. Double pain.'});
      plats.push({x:genX+8,y:GY-100,w:85});
      coins.push({x:genX+50,y:GY-128,got:false});
      genX+=95;
    }
    const fw=260;
    grounds.push({x:genX,w:fw});
    for(let i=0;i<5;i++) coins.push({x:genX+36+i*42,y:GY-36,got:false});
    genX+=fw;
  }
}

function initWorld(){
  grounds=[];plats=[];obs=[];coins=[];parts=[];msgs=[];bldgs=[];
  genX=IW+180;
  grounds.push({x:-500,w:IW+700});
  for(let i=0;i<30;i++)
    bldgs.push({
      x:i*90,w:50+Math.random()*60,h:80+Math.random()*260,
      lyr:Math.random()>.5?1:2,
      c:['#0f172a','#1e293b','#162032'][Math.floor(Math.random()*3)]
    });
  for(let i=0;i<8;i++) gen();
}

/* ═══════════════════════════════════════════════
   DRAW BACKGROUND
   ═══════════════════════════════════════════════ */
function drawBG(){
  const sg=cx.createLinearGradient(0,0,0,GY);
  sg.addColorStop(0,'#020617'); sg.addColorStop(.65,'#0c1830'); sg.addColorStop(1,'#1e2d45');
  cx.fillStyle=sg; cx.fillRect(0,0,IW,GY);

  /* stars */
  cx.fillStyle='rgba(255,255,255,.7)';
  for(let i=0;i<55;i++){
    const sx=(i*137.5)%IW,sy=(i*89.3)%(GY*.55),s=.5+Math.sin(tick*.03+i)*.4;
    cx.beginPath(); cx.arc(sx,sy,s,0,Math.PI*2); cx.fill();
  }

  /* far buildings */
  bldgs.filter(b=>b.lyr===1).forEach(b=>{
    let bx=(b.x-wx0*.15)%(IW+120); if(bx<-b.w-10) bx+=IW+120+b.w;
    cx.fillStyle=b.c; cx.fillRect(bx,GY-b.h,b.w,b.h);
    cx.fillStyle='rgba(56,189,248,.06)';
    for(let ry=GY-b.h+12;ry<GY-16;ry+=25)
      for(let rx=bx+10;rx<bx+b.w-14;rx+=18)
        if((Math.floor(ry/25)+Math.floor(rx/18))%4!==0) cx.fillRect(rx,ry,9,13);
  });
  /* near buildings */
  bldgs.filter(b=>b.lyr===2).forEach(b=>{
    let bx=(b.x-wx0*.35)%(IW+150); if(bx<-b.w-10) bx+=IW+150+b.w;
    cx.fillStyle=b.c; cx.fillRect(bx,GY-b.h,b.w,b.h);
    cx.fillStyle='rgba(148,163,184,.05)';
    for(let ry=GY-b.h+12;ry<GY-16;ry+=25)
      for(let rx=bx+10;rx<bx+b.w-14;rx+=18)
        if((Math.floor(ry/25)+Math.floor(rx/18))%3!==0) cx.fillRect(rx,ry,9,13);
  });

  /* horizon */
  cx.save(); cx.shadowColor='#38bdf8'; cx.shadowBlur=18;
  cx.fillStyle='#1d4ed8'; cx.fillRect(0,GY-3,IW,3);
  cx.restore();
}

/* ── GROUND ── */
function drawGround(){
  grounds.forEach(g=>{
    const x=sw(g.x); if(x>IW+50||x+g.w<-50) return;
    cx.fillStyle='#0f172a'; cx.fillRect(x,GY,g.w,IH-GY);
    const gg=cx.createLinearGradient(x,GY,x,GY+16);
    gg.addColorStop(0,'#1e3a5f'); gg.addColorStop(1,'#0f172a');
    cx.fillStyle=gg; cx.fillRect(x,GY,g.w,16);
    cx.strokeStyle='rgba(56,189,248,.06)'; cx.lineWidth=1;
    for(let tx=x;tx<x+g.w;tx+=60) cx.strokeRect(tx,GY,60,IH-GY);
  });
}

/* ── PLATFORMS ── */
function drawPlats(){
  plats.forEach(p=>{
    const x=sw(p.x); if(x>IW+60||x+p.w<-60) return;
    cx.fillStyle='rgba(0,0,0,.25)'; cx.fillRect(x+4,p.y+22,p.w,8);
    const pg=cx.createLinearGradient(x,p.y,x,p.y+22);
    pg.addColorStop(0,'#334155'); pg.addColorStop(1,'#1e293b');

/* ═══════════════════════════════════════════════
   PHYSICS
   ═══════════════════════════════════════════════ */
function physics(){
  PL.vy=Math.min(PL.vy+GRAVITY,20); PL.y+=PL.vy;
  const pwx=wx0+PX; let landed=false;
  if(PL.vy>=0){
    for(const p of plats){
      if(pwx>p.x+6&&pwx<p.x+p.w-6&&PL.y>=p.y&&PL.y<=p.y+PL.vy+6){
        PL.y=p.y;PL.vy=0;PL.j=0;PL.gr=true;landed=true;break;
      }
    }
  }
  if(!landed){
    for(const g of grounds){
      if(pwx>g.x&&pwx<g.x+g.w&&PL.y>=GY){
        PL.y=GY;PL.vy=0;PL.j=0;PL.gr=true;landed=true;break;
      }
    }
  }
  if(!landed){ PL.gr=false; if(PL.y>IH+120) die('\ud83d\udd73\ufe0f Fell in the gap. Resume waited at the bottom.'); }
}

function collide(){
  if(PL.inv>0) return;
  const m=10,px=PX-PL.w/2+m,py=PL.y-PL.h+m,pw=PL.w-m*2,ph=PL.h-m;
  for(const o of obs){
    if(o.isPit) continue;
    const x=sw(o.x);
    if(px<x+o.w-6&&px+pw>x+6&&py<o.y&&py+ph>o.y-o.h+8){ die(o.txt); return; }
  }
}

function collect(){
  const cx0=PX, cy0=PL.y-PL.h/2;
  coins.forEach(v=>{
    if(v.got) return;
    // Dynamically calculate the hit-box based on the player's current size
    if(Math.abs(sw(v.x)-cx0) < (PL.w/2 + 15) && Math.abs(v.y-cy0) < (PL.h/2 + 15)){
      v.got=true; vadas++; score+=12;
      rGap=Math.min(RGAP0,rGap+30);
      burst(sw(v.x),v.y,'#f59e0b',7,'+12 \ud83e\udec3');
    }
  });
}


function burst(x,y,c,n,txt){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*6;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:30+Math.random()*18,max:48,r:3+Math.random()*4,c});
  }
  if(txt) parts.push({x,y:y-14,vx:0,vy:-1.8,life:55,max:55,r:0,c,t:txt});
}

/* ═══════════════════════════════════════════════
   DIE / RESTART
   ═══════════════════════════════════════════════ */
const QUIPS=[
  'HR said "we\'ll keep your resume on file." It disagreed.',
  '404: Career path not found.',
  '"Not a culture fit." Resume catches everyone.',
  '"We went with another candidate." Classic.',
  '"Entry level — 5 years experience." The wall wins.',
  'Automated rejection system achieved sentience.',
  '"We\'ll be in touch." They weren\'t.',
];

function die(msg){
  MODE='dead';
  const prev=parseInt(localStorage.getItem('jr_best')||'0');
  if(Math.floor(score)>prev) localStorage.setItem('jr_best',Math.floor(score));
  BGM.pause();
  const vid=document.getElementById('gv');
  vid.src=F.gameover; vid.play().catch(()=>{});
  document.getElementById('ds').textContent=Math.floor(score)+' m \u00b7 \ud83e\udec3 '+vadas;
  document.getElementById('dm').textContent=msg||QUIPS[Math.floor(Math.random()*QUIPS.length)];
  document.getElementById('ov').classList.add('on');
}

function restart(){
  const vid=document.getElementById('gv'); vid.pause(); vid.src='';
  document.getElementById('ov').classList.remove('on');
  goFS();       /* ← try fullscreen again on every retry */
  startGame();
}

/* ═══════════════════════════════════════════════
   UPDATE
   ═══════════════════════════════════════════════ */
function update(){
  if(MODE!=='play'){ tick++; return; }
  tick++; score+=spd*.05;
  spd=Math.min(SPD0+score*.0013,13.5);
  wx0+=spd;
  rGap=Math.max(0,Math.min(RGAP0,rGap-0.42));
  if(rGap<=0){ die(QUIPS[Math.floor(Math.random()*QUIPS.length)]); return; }
  if(PL.inv>0) PL.inv--;
  physics(); collide(); collect();
  while(genX<wx0+IW+700) gen();
  const cull=wx0-450;
  grounds=grounds.filter(g=>g.x+g.w>cull);
  plats  =plats.filter(p=>p.x+p.w>cull);
  obs    =obs.filter(o=>o.x+(o.pitW||o.w)>cull);
  coins  =coins.filter(c=>!c.got&&sw(c.x)>-120);
  parts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; if(!p.t){p.vy+=.14;p.vx*=.93;} p.life--; });
  parts=parts.filter(p=>p.life>0);
}

   RENDER
   ═══════════════════════════════════════════════ */
function render(){
  cx.clearRect(0,0,IW,IH);
  if(MODE==='menu'){ drawMenu(); return; }
  drawBG(); drawPlats(); drawGround();
  coins.forEach(drawVada);
  obs.forEach(drawObs);
  drawFX(); drawResume(); drawPlayer(); drawHUD();
  if(MODE==='dead'){ cx.fillStyle='rgba(0,0,0,.4)'; cx.fillRect(0,0,IW,IH); }
}

function startGame(){
  wx0=0;score=0;vadas=0;spd=SPD0;tick=0;rGap=RGAP0;
  PL.y=GY;PL.vy=0;PL.j=0;PL.gr=true;PL.inv=0;

}

   JUMP INPUT
   ═══════════════════════════════════════════════ */
function doJump(){
  if(MODE==='menu'){
    goFS();       /* fullscreen on first START tap */
    startGame();
    return;
  }
  if(MODE==='dead'){ restart(); return; }
  if(PL.j<PL.mj){
    PL.vy=PL.j===0?JV:DJV; PL.j++; PL.gr=false; jsfx();
    for(let i=0;i<8;i++){
      const a=Math.PI+(Math.random()-.5)*1.1;
      parts.push({x:PX,y:PL.y,vx:Math.cos(a)*4,vy:Math.sin(a)*2.2,life:20,max:20,r:4,c:'#94a3b8'});
    }
  }
}

/* ═══════════════════════════════════════════════
   EVENT LISTENERS
   ═══════════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); doJump(); }
  if(e.code==='Enter'&&MODE==='dead') restart();
});

cv.addEventListener('pointerdown',e=>{ e.preventDefault(); doJump(); });

/* Overlay tap → retry */
const OV=document.getElementById('ov');
OV.addEventListener('pointerdown',e=>{ e.preventDefault(); e.stopPropagation(); if(MODE==='dead') restart(); });
OV.addEventListener('touchstart',e=>{ e.preventDefault(); e.stopPropagation(); if(MODE==='dead') restart(); },{passive:false});

/* ═══════════════════════════════════════════════
   FULLSCREEN BUTTON
   ═══════════════════════════════════════════════ */
(function(){
  const btn=document.getElementById('fsBtn');
  const iconEnter=document.getElementById('fsEnter');
  const iconExit=document.getElementById('fsExit');

  function isFS(){
    return !!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement);
  }
  function updateIcon(){
    const fs=isFS();
    iconEnter.style.display=fs?'none':'';
    iconExit.style.display=fs?'':'none';
  }
  function toggleFS(){
    if(isFS()){
      (document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen||document.msExitFullscreen).call(document);
    } else {
      goFS();
    }
  }
  btn.addEventListener('click',e=>{ e.stopPropagation(); toggleFS(); });
  btn.addEventListener('pointerdown',e=>e.stopPropagation());
  document.addEventListener('fullscreenchange',updateIcon);
  document.addEventListener('webkitfullscreenchange',updateIcon);
  document.addEventListener('mozfullscreenchange',updateIcon);
})();
(function loop(){ update(); render(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
